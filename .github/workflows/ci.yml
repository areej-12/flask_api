name: Flask CI Pipeline
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checout code
              uses: actions/checkout@v2
            - name: Set up Python 3.11
              uses: actions/setup-python@v2
              with:
                    python-version: 3.11
            - name: Install dependencies
              run: | python -m install --upgrade pip
                     pip install -r requirements.txt
                     pip install pytest
            - name: Run tests
              run: python -m pytest test_app.py
            - name: Verify Health Points
              run: curl -f http://localhost:5000/health || exit 1
        build:
            name: Build Docker Image
            runs-on: ubuntu-latest
            steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Build Docker image
                  run: docker build -t flask-api:${{ github.sha }} .

                - name: Verify container starts correctly
                  run: |
                    docker run -d -p 5000:5000 --name test-container \
                        flask-api:${{ github.sha }}
                    sleep 3
                    curl --fail http://localhost:5000/api/health
                    docker stop test-container
                    docker rm test-container
    report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Print summary
        run: echo 'Pipeline complete for commit: ${{ github.sha }}'

      - name: Confirm secret loaded
        run: echo 'Secret loaded successfully'
        env:
          LAB_SECRET: ${{ secrets.LAB_SECRET }}
